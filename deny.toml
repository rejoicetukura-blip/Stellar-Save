# cargo-deny configuration
# Policy: allow permissive OSS licenses; deny copyleft and proprietary.
# To add an exception, add the crate name to the relevant [[licenses.exceptions]] entry.

[licenses]
# Confidence threshold for license detection (0.0–1.0)
confidence-threshold = 0.8

allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-DFS-2016",
  "Unicode-3.0",
  "CC0-1.0",
  "Zlib",
  "BSL-1.0",  # Boost Software License
]

deny = [
  "GPL-2.0",
  "GPL-3.0",
  "LGPL-2.0",
  "LGPL-2.1",
  "LGPL-3.0",
  "AGPL-3.0",
  "SSPL-1.0",
  "Commons-Clause",
]

# Crates whose licenses are checked but whose specific license is known and accepted
exceptions = []

[bans]
# Deny multiple versions of the same crate to keep the dependency tree clean.
multiple-versions = "warn"
deny = []

[advisories]
# Point to the RustSec advisory database.
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
# Fail on any unmaintained or vulnerable crate.
ignore = []
