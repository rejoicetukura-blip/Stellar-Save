name: Mobile Beta Release

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to release'
        required: true
        type: choice
        options:
          - both
          - ios
          - android
      version:
        description: 'Version number (e.g., 1.0.0)'
        required: true
        type: string

env:
  NODE_VERSION: '20'
  JAVA_VERSION: '17'
  XCODE_VERSION: '15.0'
  RUBY_VERSION: '3.2'

jobs:
  # ══════════════════════════════════════════════════════════════════════════
  # Build Web Assets
  # ══════════════════════════════════════════════════════════════════════════
  build-web:
    name: Build Web Assets
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          VITE_APP_VERSION: ${{ inputs.version }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: frontend/dist
          retention-days: 30

  # ══════════════════════════════════════════════════════════════════════════
  # iOS TestFlight Release
  # ══════════════════════════════════════════════════════════════════════════
  ios-release:
    name: iOS TestFlight Release
    runs-on: macos-14
    needs: build-web
    if: inputs.platform == 'ios' || inputs.platform == 'both'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true
          working-directory: frontend/ios

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Download web build
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: frontend/dist

      - name: Sync Capacitor
        working-directory: frontend
        run: npx cap sync ios

      - name: Install CocoaPods
        working-directory: frontend/ios/App
        run: pod install

      - name: Import certificates
        uses: apple-actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_P12 }}
          p12-password: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}

      - name: Download provisioning profiles
        env:
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        working-directory: frontend/ios
        run: bundle exec fastlane match appstore --readonly

      - name: Build and upload to TestFlight
        env:
          FASTLANE_APPLE_APPLICATION_SPECIFIC_PASSWORD: ${{ secrets.FASTLANE_APPLE_APPLICATION_SPECIFIC_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_STORE_CONNECT_TEAM_ID: ${{ secrets.APP_STORE_CONNECT_TEAM_ID }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
        working-directory: frontend/ios
        run: bundle exec fastlane beta

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ios-build-logs
          path: |
            frontend/ios/fastlane/report.xml
            frontend/ios/fastlane/test_output
          retention-days: 30

  # ══════════════════════════════════════════════════════════════════════════
  # Android Play Console Release
  # ══════════════════════════════════════════════════════════════════════════
  android-release:
    name: Android Play Console Release
    runs-on: ubuntu-latest
    needs: build-web
    if: inputs.platform == 'android' || inputs.platform == 'both'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true
          working-directory: frontend/android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'gradle'

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Download web build
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: frontend/dist

      - name: Sync Capacitor
        working-directory: frontend
        run: npx cap sync android

      - name: Decode Keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        working-directory: frontend/android
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > release.keystore

      - name: Build and upload to Play Console
        env:
          ANDROID_KEYSTORE_FILE: ${{ github.workspace }}/frontend/android/release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          PLAY_STORE_JSON_KEY: ${{ secrets.PLAY_STORE_JSON_KEY }}
        working-directory: frontend/android
        run: bundle exec fastlane beta

      - name: Cleanup keystore
        if: always()
        working-directory: frontend/android
        run: rm -f release.keystore

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: android-build-logs
          path: |
            frontend/android/fastlane/report.xml
            frontend/android/app/build/outputs/bundle/release/*.aab
          retention-days: 30

  # ══════════════════════════════════════════════════════════════════════════
  # Create GitHub Release
  # ══════════════════════════════════════════════════════════════════════════
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [ios-release, android-release]
    if: always() && (needs.ios-release.result == 'success' || needs.android-release.result == 'success')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ inputs.version }}
          name: Mobile Beta v${{ inputs.version }}
          body: |
            ## Stellar Save Mobile Beta v${{ inputs.version }}
            
            ### Platforms Released
            - iOS TestFlight: ${{ needs.ios-release.result == 'success' && '✅' || '❌' }}
            - Android Play Console: ${{ needs.android-release.result == 'success' && '✅' || '❌' }}
            
            ### Installation
            - **iOS**: Install from TestFlight invitation
            - **Android**: Download from Play Console Internal Track
            
            ### Notes
            This is a beta release for internal testing.
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
