name: Cost Monitoring

on:
  schedule:
    # Run daily at 08:00 UTC
    - cron: '0 8 * * *'
  workflow_dispatch:
  pull_request:
    paths:
      - 'infra/**'

jobs:
  tag-compliance:
    name: Terraform Tag Compliance
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.7"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
        continue-on-error: true  # allow offline/dry-run without real credentials

      - name: Generate plan JSON — staging
        working-directory: infra/envs/staging
        run: |
          terraform init -input=false -reconfigure \
            -backend-config="bucket=stellar-save-terraform-state" \
            -backend-config="key=staging/terraform.tfstate" \
            -backend-config="region=us-east-1" 2>/dev/null || \
          terraform init -input=false -backend=false 2>/dev/null || true
          terraform plan -input=false -out=plan.tfplan \
            -var="monthly_budget_usd=100" \
            -var='budget_alert_emails=[]' 2>/dev/null || true
          terraform show -json plan.tfplan > ../../../staging-plan.json 2>/dev/null || echo '{}' > ../../../staging-plan.json
          rm -f plan.tfplan
        continue-on-error: true

      - name: Check tags — staging
        run: |
          PLAN_JSON=staging-plan.json bash scripts/check-tags.sh || {
            echo "::error::Staging plan has resources missing required cost-allocation tags. See docs/tagging-standard.md"
            exit 1
          }

      - name: Generate plan JSON — production
        working-directory: infra/envs/production
        run: |
          terraform init -input=false -backend=false 2>/dev/null || true
          terraform plan -input=false -out=plan.tfplan \
            -var="monthly_budget_usd=500" \
            -var='budget_alert_emails=[]' \
            -var="acm_certificate_arn=arn:aws:acm:us-east-1:000000000000:certificate/placeholder" \
            -var="listener_arn=arn:aws:elasticloadbalancing:us-east-1:000000000000:listener/placeholder" \
            2>/dev/null || true
          terraform show -json plan.tfplan > ../../../production-plan.json 2>/dev/null || echo '{}' > ../../../production-plan.json
          rm -f plan.tfplan
        continue-on-error: true

      - name: Check tags — production
        run: |
          PLAN_JSON=production-plan.json bash scripts/check-tags.sh || {
            echo "::error::Production plan has resources missing required cost-allocation tags. See docs/tagging-standard.md"
            exit 1
          }

      - name: Cleanup plan files
        if: always()
        run: rm -f staging-plan.json production-plan.json

  cost-report:
    name: Generate Cost Report
    runs-on: ubuntu-latest
    permissions:
      actions: read
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch GitHub Actions usage
        id: usage
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Billing API — available on paid plans; returns 0 on free plans
          RESPONSE=$(gh api /repos/${{ github.repository }}/actions/billing/usage 2>/dev/null || echo '{}')
          MINUTES_USED=$(echo "$RESPONSE" | jq -r '.total_minutes_used // 0')
          MINUTES_LIMIT=$(echo "$RESPONSE" | jq -r '.included_minutes // 2000')
          PAID_MINUTES=$(echo "$RESPONSE" | jq -r '.total_paid_minutes_used // 0')

          echo "minutes_used=$MINUTES_USED"   >> "$GITHUB_OUTPUT"
          echo "minutes_limit=$MINUTES_LIMIT" >> "$GITHUB_OUTPUT"
          echo "paid_minutes=$PAID_MINUTES"   >> "$GITHUB_OUTPUT"

      - name: Calculate costs
        id: costs
        run: |
          MINUTES_USED=${{ steps.usage.outputs.minutes_used }}
          MINUTES_LIMIT=${{ steps.usage.outputs.minutes_limit }}
          PAID_MINUTES=${{ steps.usage.outputs.paid_minutes }}

          # CI cost: $0.008/min for Linux overage
          CI_COST=$(python3 -c "print(round($PAID_MINUTES * 0.008, 2))")

          # Usage percentage
          if [ "$MINUTES_LIMIT" -gt 0 ]; then
            PCT=$(python3 -c "print(round($MINUTES_USED / $MINUTES_LIMIT * 100, 1))")
          else
            PCT=0
          fi

          echo "ci_cost=$CI_COST"   >> "$GITHUB_OUTPUT"
          echo "usage_pct=$PCT"     >> "$GITHUB_OUTPUT"

      - name: Run cost optimization check
        run: |
          chmod +x scripts/cost_optimization.sh
          scripts/cost_optimization.sh

      - name: Post cost summary as issue comment (weekly)
        if: github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DAY=$(date +%u)   # 1=Mon … 7=Sun
          [ "$DAY" != "1" ] && exit 0   # only post on Mondays

          MINUTES_USED=${{ steps.usage.outputs.minutes_used }}
          MINUTES_LIMIT=${{ steps.usage.outputs.minutes_limit }}
          CI_COST=${{ steps.costs.outputs.ci_cost }}
          PCT=${{ steps.costs.outputs.usage_pct }}

          BODY="## 📊 Weekly Cost Report — $(date +%Y-%m-%d)

          | Metric | Value |
          |--------|-------|
          | CI minutes used | ${MINUTES_USED} / ${MINUTES_LIMIT} (${PCT}%) |
          | CI overage cost | \$${CI_COST} |

          > Full details: [Cost Monitoring dashboard](http://localhost:3000/d/stellar-save-costs)
          > Optimization tips: run \`scripts/cost_optimization.sh\`"

          gh issue create \
            --title "Weekly Cost Report $(date +%Y-%m-%d)" \
            --body "$BODY" \
            --label "cost-monitoring" \
            || true   # don't fail if label doesn't exist

      - name: Fail if CI minutes > 90% of limit
        run: |
          PCT=${{ steps.costs.outputs.usage_pct }}
          python3 -c "
          pct = float('$PCT')
          if pct >= 90:
              print(f'::warning::CI minutes at {pct}% of monthly limit — overage charges imminent')
          if pct >= 100:
              print(f'::error::CI minutes limit exceeded — overage charges active')
              exit(1)
          print(f'CI minutes usage: {pct}% — OK')
          "
