name: Synthetic Monitoring

on:
  schedule:
    - cron: '*/15 * * * *' # every 15 minutes
  workflow_dispatch:
    inputs:
      simulate_failure:
        description: 'Force the connect-wallet check to fail (verifies alerting works)'
        type: boolean
        default: false

jobs:
  canary:
    name: Canary (${{ matrix.region }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        # GitHub-hosted runners do not guarantee physical region placement.
        # These labels group results for alerting/reporting; for true geo-distributed
        # checks, point self-hosted runners with these labels at different regions —
        # see docs/synthetic-monitoring.md.
        region: [us-east, eu-west, ap-southeast]

    env:
      CANARY_BASE_URL: ${{ secrets.PRODUCTION_APP_URL }}
      API_BASE_URL: ${{ secrets.PRODUCTION_API_URL }}
      SIMULATE_FAILURE: ${{ (inputs.simulate_failure && '1') || '0' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      - name: Run journey canaries
        id: journeys
        run: npx playwright test --config=e2e/synthetic/playwright.config.ts
        working-directory: frontend

      - name: Run read-only API health canary
        id: api_health
        if: always()
        run: node scripts/synthetic/check-api-health.mjs

      - name: Write status summary
        if: always()
        run: |
          {
            echo "### Synthetic monitoring — region \`${{ matrix.region }}\`"
            echo "| Journey | Result |"
            echo "|---|---|"
            echo "| connect-wallet / view-groups (Playwright) | ${{ steps.journeys.outcome == 'success' && '✅ pass' || '❌ fail' }} |"
            echo "| read-only API health | ${{ steps.api_health.outcome == 'success' && '✅ pass' || '❌ fail' }} |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: canary-report-${{ matrix.region }}
          path: frontend/playwright-report/
          retention-days: 14

      - name: Notify on failure
        if: failure() && env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -sf -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"🔴 Synthetic monitoring failure in region *${{ matrix.region }}* — journeys: ${{ steps.journeys.outcome }}, api-health: ${{ steps.api_health.outcome }}. Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            "$SLACK_WEBHOOK_URL"
