name: SEP-24 Fiat Ramp Integration Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/sep24-integration.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/sep24-integration.yml'
  schedule:
    # Run nightly at 2 AM UTC to catch integration regressions
    - cron: '0 2 * * *'

jobs:
  sep24-integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: stellar_save_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Setup test database
        env:
          TEST_DATABASE_URL: postgresql://test:test@localhost:5433/stellar_save_test
        run: |
          npx prisma migrate deploy --schema=./prisma/schema.prisma
        continue-on-error: true

      - name: Run SEP-24 integration tests
        env:
          TEST_DATABASE_URL: postgresql://test:test@localhost:5433/stellar_save_test
          NODE_ENV: test
          REDIS_HOST: ""
        run: |
          npm run test:integration -- --testPathPattern=sep24-fiat-ramp

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sep24-test-results
          path: backend/coverage/
          retention-days: 7

      - name: Comment on PR with test results
        if: github.event_name == 'pull_request' && failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '⚠️ SEP-24 integration tests failed. Please review the test output for details.'
            })

  sep24-sandbox-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Build SEP-24 sandbox Docker image
        working-directory: backend
        run: |
          docker build -f test/Dockerfile.sep24-sandbox -t sep24-sandbox:test .

      - name: Start SEP-24 sandbox
        run: |
          docker run -d -p 8545:8545 --name sep24-sandbox sep24-sandbox:test
          sleep 5

      - name: Validate sandbox endpoints
        run: |
          echo "Testing stellar.toml endpoint..."
          curl -f http://localhost:8545/.well-known/stellar.toml || exit 1
          
          echo "Testing auth endpoint..."
          curl -f "http://localhost:8545/auth?account=GDQNY3PBOJOKYZSRMK2S7LHHGWZIUISD4QORETLMXEWXBI7KFZZMKTL3" || exit 1
          
          echo "✅ SEP-24 sandbox is healthy"

      - name: Stop sandbox
        if: always()
        run: docker stop sep24-sandbox || true
