name: Dependency Scanning

on:
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run dependency scans
        id: report
        shell: bash
        run: |
          set +e
          mkdir -p dependency-audit

          cargo audit --json --file Cargo.lock > dependency-audit/contracts.json
          npm audit --json --audit-level=high > dependency-audit/frontend.json
          npm audit --json --audit-level=high > dependency-audit/backend.json

          node <<'NODE'
          const fs = require('fs');

          const outDir = 'dependency-audit';

          function readJson(file) {
            try {
              return JSON.parse(fs.readFileSync(file, 'utf8'));
            } catch {
              return null;
            }
          }

          function uniqueLines(lines) {
            return [...new Set(lines.filter(Boolean))];
          }

          function npmFindings(data) {
            const metadata = data?.metadata?.vulnerabilities || {};
            const high = Number(metadata.high || 0);
            const critical = Number(metadata.critical || 0);
            const findings = [];

            const addFinding = (name, severity, detail) => {
              const suffix = detail ? `: ${detail}` : '';
              findings.push(`- \`${name}\` [${severity}]${suffix}`);
            };

            const entries = data?.vulnerabilities && typeof data.vulnerabilities === 'object'
              ? Object.entries(data.vulnerabilities)
              : [];

            for (const [name, vuln] of entries) {
              const severity = String(vuln?.severity || '').toLowerCase();
              if (!['high', 'critical'].includes(severity)) continue;

              const title = vuln?.title || vuln?.via?.find?.((item) => item && typeof item === 'object')?.title || '';
              const range = vuln?.range || '';
              addFinding(name, severity, uniqueLines([range, title]).join(' | '));
            }

            const advisories = data?.advisories && typeof data.advisories === 'object'
              ? Object.values(data.advisories)
              : [];

            for (const adv of advisories) {
              const severity = String(adv?.severity || '').toLowerCase();
              if (!['high', 'critical'].includes(severity)) continue;

              const name = adv?.module_name || adv?.name || 'unknown-package';
              const title = adv?.title || '';
              const range = adv?.vulnerable_versions || adv?.range || '';
              addFinding(name, severity, uniqueLines([range, title]).join(' | '));
            }

            return {
              high,
              critical,
              findings: uniqueLines(findings),
            };
          }

          function cargoFindings(data) {
            const list = data?.vulnerabilities?.list || [];
            const findings = list.map((vuln) => {
              const advisory = vuln?.advisory || {};
              const pkg = vuln?.package?.name || vuln?.package || 'unknown-package';
              const version = vuln?.package?.version ? ` ${vuln.package.version}` : '';
              const title = advisory?.title || '';
              const severity = String(advisory?.severity || vuln?.severity || 'critical').toLowerCase();
              const details = uniqueLines([
                advisory?.url || '',
                title,
              ]).join(' | ');

              return `- \`${advisory?.id || 'unknown-id'}\` ${pkg}${version} [${severity}]${details ? `: ${details}` : ''}`;
            });

            return {
              high: 0,
              critical: Number(data?.vulnerabilities?.count || list.length || 0),
              findings: uniqueLines(findings),
            };
          }

          const cargo = cargoFindings(readJson(`${outDir}/contracts.json`));
          const frontend = npmFindings(readJson(`${outDir}/frontend.json`));
          const backend = npmFindings(readJson(`${outDir}/backend.json`));

          const sections = [
            {
              name: 'Rust contracts',
              scope: 'Critical severity only',
              ...cargo,
            },
            {
              name: 'Frontend',
              scope: 'High and critical',
              ...frontend,
            },
            {
              name: 'Backend',
              scope: 'High and critical',
              ...backend,
            },
          ];

          const totalFindings = sections.some((section) => section.findings.length > 0);
          const today = new Date().toISOString().slice(0, 10);
          const lines = [
            '## Dependency Vulnerability Report',
            `Generated: ${today}`,
            '',
            '| Area | High | Critical | Scope |',
            '| --- | ---: | ---: | --- |',
          ];

          for (const section of sections) {
            lines.push(`| ${section.name} | ${section.high} | ${section.critical} | ${section.scope} |`);
          }

          lines.push('');

          for (const section of sections) {
            lines.push(`### ${section.name}`);
            if (section.findings.length === 0) {
              lines.push('- No high or critical findings.');
            } else {
              lines.push(...section.findings.slice(0, 10));
              if (section.findings.length > 10) {
                lines.push(`- ...and ${section.findings.length - 10} more.`);
              }
            }
            lines.push('');
          }

          if (!totalFindings) {
            lines.push('✅ No high or critical dependency findings were detected.');
          }

          fs.writeFileSync(`${outDir}/report.md`, lines.join('\n'));
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `has_findings=${totalFindings}\n`);
          NODE

      - name: Publish dependency issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const label = 'dependency-vulnerability-scan';
            const hasFindings = '${{ steps.report.outputs.has_findings }}' === 'true';
            const body = fs.readFileSync('dependency-audit/report.md', 'utf8');

            try {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: label,
                color: 'dc2626',
                description: 'Weekly dependency vulnerability findings',
              });
            } catch {}

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: label,
              state: 'open',
              per_page: 10,
            });

            const existing = issues.data[0];
            const title = '🔒 Dependency Vulnerability Scan';

            if (hasFindings) {
              if (existing) {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: existing.number,
                  body,
                });
              } else {
                await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title,
                  body,
                  labels: [label],
                });
              }
            } else if (existing) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                state: 'closed',
                body,
              });
            }
