name: E2E Nightly

on:
  schedule:
    - cron: '0 2 * * *' # 02:00 UTC nightly
  workflow_dispatch: # allow manual runs

jobs:
  e2e-journey:
    name: ROSCA Journey (standalone)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      stellar:
        image: stellar/quickstart:latest
        ports:
          - 8000:8000
        env:
          NETWORK: standalone
          ENABLE_SOROBAN_RPC: 'true'
        options: >-
          --health-cmd "curl -sf http://localhost:8000/ || exit 1"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      - name: Deploy contract to standalone network
        run: |
          # Install Stellar CLI
          cargo install --locked stellar-cli --features opt 2>/dev/null || true
          stellar contract deploy \
            --wasm target/wasm32-unknown-unknown/release/stellar_save.wasm \
            --source-account root \
            --rpc-url http://localhost:8000/soroban/rpc \
            --network-passphrase "Standalone Network ; February 2017" \
            --ignore-checks \
            > /tmp/contract-id.txt 2>&1 || echo "Deploy skipped (wasm not built)"
          echo "CONTRACT_ID=$(cat /tmp/contract-id.txt | tail -1)" >> "$GITHUB_ENV"
        env:
          STELLAR_NETWORK: standalone

      - name: Run journey tests
        run: npx playwright test --config=e2e/playwright.config.ts
        working-directory: frontend
        env:
          CI: 'true'
          STELLAR_RPC_URL: http://localhost:8000/soroban/rpc
          HORIZON_URL: http://localhost:8000
          STELLAR_NETWORK_PASSPHRASE: 'Standalone Network ; February 2017'
          VITE_CONTRACT_ID: ${{ env.CONTRACT_ID }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-journey-report
          path: frontend/e2e/e2e-report/
          retention-days: 14

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-journey-results
          path: frontend/test-results/
          retention-days: 7
