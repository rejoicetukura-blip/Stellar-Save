<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline — Stellar Save</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: system-ui, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100dvh;
        gap: 1.5rem;
        padding: 1.5rem;
        text-align: center;
      }
      svg { width: 64px; height: 64px; color: #6366f1; }
      h1 { font-size: 1.5rem; font-weight: 700; }
      p { color: #94a3b8; max-width: 360px; line-height: 1.6; }
      button {
        background: #6366f1;
        color: #fff;
        border: none;
        border-radius: 8px;
        padding: 0.75rem 1.5rem;
        font-size: 1rem;
        cursor: pointer;
      }
      button:hover { background: #4f46e5; }
      .links { display: flex; gap: 0.75rem; flex-wrap: wrap; justify-content: center; }
      .links a {
        color: #a5b4fc;
        text-decoration: none;
        border: 1px solid #334155;
        border-radius: 8px;
        padding: 0.5rem 1rem;
        font-size: 0.9rem;
      }
      .links a:hover { background: #1e293b; }
    </style>
  </head>
  <body>
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
        d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z" />
    </svg>
    <h1>You're offline</h1>
    <p>
      No internet connection. You can still browse pages you've already visited
      in read-only mode. Saving and contributions resume once you're back online.
    </p>
    <div class="links">
      <a href="/dashboard">Dashboard</a>
      <a href="/groups">Groups</a>
    </div>
    <button onclick="location.reload()">Try again</button>
  </body>
</html>
